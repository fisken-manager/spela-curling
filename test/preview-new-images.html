<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review New Upgrade Images - Spela Curling</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Work+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: #0a0a12;
            color: #e0e0e0;
            font-family: 'Work Sans', sans-serif;
            padding: 20px;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        h1 { font-family: 'Space Mono', monospace; color: #ffd700; text-align: center; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }
        .upgrade-group {
            background: #1a1a28;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2a2a3a;
        }
        .upgrade-title {
            font-family: 'Space Mono', monospace;
            color: #ffd700;
            font-size: 1.2rem;
            margin-bottom: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }
        .tier-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: flex-start;
        }
        .image-container {
            flex: 1;
            text-align: center;
        }
        .image-container img {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            background: #000;
            border: 2px solid #222;
        }
        .image-label {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 5px;
            text-transform: uppercase;
        }
        .tier-info {
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
            margin-bottom: 5px;
            color: #94a3b8;
        }
        .new-img { border-color: #ffd700 !important; }
        .controls {
            position: sticky;
            top: 0;
            background: #0a0a12;
            padding: 10px;
            z-index: 100;
            border-bottom: 1px solid #2a2a3a;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        button {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }
        .missing {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #222;
            color: #444;
            aspect-ratio: 1;
            border-radius: 8px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="controls">
            <h1>Upgrade Image Review</h1>
            <button onclick="window.location.reload()">Refresh Images</button>
        </div>

        <div id="review-grid" class="grid"></div>
    </div>

    <script>
        const UPGRADES = [
            { id: 'speed', name: 'Skogens Språng', tiers: [1,2,3,4,5] },
            { id: 'friction', name: 'Vattnad Väg', tiers: [1,2,3,4,5] },
            { id: 'size', name: 'Jättens Fotsteg', tiers: [1,2,3,4,5] },
            { id: 'magnetism', name: 'Dala-Magneten', tiers: [1,2,3,4,5] },
            { id: 'spin_win', name: 'Själs-Snurran', tiers: [1,2,3] },
            { id: 'gold_grift', name: 'Snålvargens Arv', tiers: [1,2,3] },
            { id: 'glass_cannon', name: 'Skört Stål', tiers: [1,2,3] },
            { id: 'wall_speed', name: 'Väggarnas Vrede', tiers: [1,2,3] },
            { id: 'friction_forge', name: 'Slitvargens Flit', tiers: [1,2,3] },
            { id: 'spin_to_speed', name: 'Nav-Gnisslet', tiers: [1,2,3] },
            { id: 'rail_rider', name: 'Timmermannens Grepp', tiers: [1,2,3] },
            { id: 'echo_woods', name: 'Eko från Skogen', tiers: [1,2,3] },
            { id: 'event_horizon', name: 'Händelsehorisonten', tiers: [1,2,3] },
            { id: 'snap_curl', name: 'Krokiga Ryggskottet', tiers: [1,2,3] },
            { id: 'wall_ping_coin', name: 'Vägg-Tionden', tiers: [1,2,3] },
            { id: 'double_shops', name: 'Marknadsaftonen', tiers: [1,2,3] },
            { id: 'tar_launch', name: 'Tjärens Offer', tiers: [1,2] },
            { id: 'sweep_life', name: 'Soparens Sista Hopp', tiers: [1,2] },
            { id: 'needle_eye', name: 'Nålögat', tiers: [1,2,3] },
            { id: 'frozen_broom', name: 'Kvastens Vila', tiers: [1,2,3] },
            { id: 'cursed_harvest', name: 'Oväder i Antåg', tiers: [1,2,3] },
        ];

        const grid = document.getElementById('review-grid');

        UPGRADES.forEach(u => {
            const group = document.createElement('div');
            group.className = 'upgrade-group';
            
            let html = `<div class="upgrade-title">${u.name} (${u.id})</div>`;
            
            u.tiers.forEach(t => {
                const oldSrc = `assets/${u.id}-tier${t}.jpg`;
                const newSrc = `assets/new_previews/${u.id}-tier${t}.jpg`;
                
                html += `
                    <div class="tier-info">Tier ${t}</div>
                    <div class="tier-row">
                        <div class="image-container">
                            <img src="${oldSrc}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                            <div class="missing" style="display:none">OLD MISSING</div>
                            <div class="image-label">Current</div>
                        </div>
                        <div class="image-container">
                            <img class="new-img" src="${newSrc}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                            <div class="missing" style="display:none">NEW NOT GENERATED</div>
                            <div class="image-label">New Preview</div>
                        </div>
                    </div>
                `;
            });
            
            group.innerHTML = html;
            grid.appendChild(group);
        });
    </script>
</body>
</html>
