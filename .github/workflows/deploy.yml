name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - test

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy-main:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-test:
    if: github.ref_name == 'test'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Deploy test branch to subdirectory
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Fetch gh-pages branch or create it
          git fetch origin gh-pages || true
          
          # Create a temp directory for the test build
          mkdir -p /tmp/test-build
          cp -r . /tmp/test-build/
          cd /tmp/test-build
          
          # Checkout or create gh-pages branch
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          
          # Clean and copy test build to /test subdirectory
          git rm -rf test 2>/dev/null || true
          mkdir -p test
          cp -r /tmp/test-build/* test/
          
          # Add a banner to indicate test version
          sed -i 's/<body>/<body><div style="background: #e67e22; color: white; text-align: center; padding: 5px; font-family: monospace;">🧪 TEST VERSION<\/div>/' test/index.html 2>/dev/null || true
          
          git add test/
          git commit -m "Deploy test branch to /test" || echo "No changes"
          git push origin gh-pages --force